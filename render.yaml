services:
  - type: web
    name: napoli-voice-agent
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Clover POS — set values in Render dashboard
      - key: CLOVER_MERCHANT_ID
        sync: false
      - key: CLOVER_API_TOKEN
        sync: false
      - key: CLOVER_BASE_URL
        value: https://api.clover.com
      - key: CLOVER_ECOMM_BASE_URL
        value: https://api.clover.com
      # Twilio SMS — set values in Render dashboard
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_PHONE_SID
        sync: false
      # Vapi.ai — set values in Render dashboard
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_PHONE_NUMBER_ID
        sync: false
      - key: VAPI_ASSISTANT_ID
        sync: false
      # Restaurant Settings
      - key: RESTAURANT_PHONE
        value: "7252040379"
      - key: RESTAURANT_NAME
        value: Napoli Pizzeria
      - key: RESTAURANT_TIMEZONE
        value: America/Los_Angeles
      - key: MANAGER_EMAIL
        value: info@napolipizzeria.net
      # App Settings
      - key: APP_HOST
        value: "0.0.0.0"
      - key: APP_PORT
        value: "8000"
      - key: APP_SECRET_KEY
        sync: false
      - key: BASE_URL
        value: https://napoli-voice-agent.onrender.com
