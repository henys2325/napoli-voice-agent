<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Napoli Pizzeria — Order Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }

    /* Header */
    .header {
      background: linear-gradient(135deg, #c0392b, #8e1a12);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
    .header .subtitle { font-size: 0.8rem; color: rgba(255,255,255,0.7); margin-top: 2px; }
    .live-badge {
      background: #27ae60; color: #fff; padding: 4px 10px;
      border-radius: 20px; font-size: 0.75rem; font-weight: 600;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      padding: 20px 24px;
    }
    .stat-card {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #0f3460;
      text-align: center;
    }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #e74c3c; }
    .stat-card .label { font-size: 0.75rem; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Filter Bar */
    .filter-bar {
      padding: 0 24px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #0f3460;
      background: #16213e;
      color: #aaa;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover { background: #c0392b; color: #fff; border-color: #c0392b; }
    .refresh-btn {
      margin-left: auto;
      padding: 6px 16px;
      border-radius: 20px;
      border: none;
      background: #0f3460;
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .refresh-btn:hover { background: #1a5276; }

    /* Orders Table */
    .orders-container { padding: 0 24px 24px; }
    .orders-table { width: 100%; border-collapse: collapse; }
    .orders-table th {
      background: #0f3460;
      padding: 10px 14px;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
    }
    .orders-table td {
      padding: 12px 14px;
      border-bottom: 1px solid #0f3460;
      font-size: 0.85rem;
      vertical-align: top;
    }
    .orders-table tr:hover td { background: rgba(15,52,96,0.3); }

    /* Status Badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-pending { background: #f39c12; color: #000; }
    .badge-paid { background: #27ae60; color: #fff; }
    .badge-kitchen { background: #2980b9; color: #fff; }
    .badge-error { background: #e74c3c; color: #fff; }

    /* Order Type */
    .type-delivery { color: #e67e22; font-weight: 600; }
    .type-pickup { color: #3498db; font-weight: 600; }

    /* Language Flag */
    .lang { font-size: 1.1rem; }

    /* Items List */
    .items-list { font-size: 0.78rem; color: #aaa; margin-top: 4px; }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #555;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    /* Loading */
    .loading { text-align: center; padding: 40px; color: #555; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      max-width: 560px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid #0f3460;
    }
    .modal h2 { font-size: 1.1rem; margin-bottom: 16px; color: #e74c3c; }
    .modal-close { float: right; cursor: pointer; font-size: 1.2rem; color: #888; }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #0f3460; font-size: 0.85rem; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #888; }
    .detail-value { font-weight: 600; text-align: right; max-width: 60%; word-break: break-word; }
    .payment-link { color: #3498db; text-decoration: none; font-size: 0.8rem; }
    .payment-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🍕 Napoli Pizzeria</h1>
    <div class="subtitle">Voice AI Order Dashboard</div>
  </div>
  <div class="live-badge">● LIVE</div>
</div>

<div class="stats-row" id="statsRow">
  <div class="stat-card"><div class="value" id="statTotal">—</div><div class="label">Total Orders</div></div>
  <div class="stat-card"><div class="value" id="statPending">—</div><div class="label">Awaiting Payment</div></div>
  <div class="stat-card"><div class="value" id="statPaid">—</div><div class="label">Paid & Sent</div></div>
  <div class="stat-card"><div class="value" id="statRevenue">—</div><div class="label">Today's Revenue</div></div>
  <div class="stat-card"><div class="value" id="statTotalRevenue">—</div><div class="label">Total Revenue</div></div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('pending_payment', this)">Pending Payment</button>
  <button class="filter-btn" onclick="setFilter('paid', this)">Paid</button>
  <button class="filter-btn" onclick="setFilter('sent_to_kitchen', this)">In Kitchen</button>
  <button class="filter-btn" onclick="setFilter('clover_error', this)">Errors</button>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</div>

<div class="orders-container">
  <table class="orders-table">
    <thead>
      <tr>
        <th>Time</th>
        <th>Customer</th>
        <th>Type</th>
        <th>Items</th>
        <th>Total</th>
        <th>Status</th>
        <th>Lang</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="ordersBody">
      <tr><td colspan="8" class="loading">Loading orders...</td></tr>
    </tbody>
  </table>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <span class="modal-close" onclick="closeModal()">✕</span>
    <h2>Order Details</h2>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let currentFilter = 'all';
let allOrders = [];

const STATUS_BADGES = {
  'pending_payment': '<span class="badge badge-pending">Awaiting Payment</span>',
  'paid': '<span class="badge badge-paid">Paid</span>',
  'sent_to_kitchen': '<span class="badge badge-kitchen">In Kitchen</span>',
  'clover_error': '<span class="badge badge-error">Error</span>'
};

const LANG_FLAGS = { 'en': '🇺🇸', 'es': '🇲🇽', 'ru': '🇷🇺' };

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function formatTime(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatPhone(phone) {
  if (!phone) return '—';
  const p = phone.replace(/\D/g, '').slice(-10);
  return p.length === 10 ? `(${p.slice(0,3)}) ${p.slice(3,6)}-${p.slice(6)}` : phone;
}

async function loadData() {
  try {
    // Load stats
    const statsRes = await fetch('/api/stats');
    const stats = await statsRes.json();
    document.getElementById('statTotal').textContent = stats.total_orders ?? '0';
    document.getElementById('statPending').textContent = stats.pending_orders ?? '0';
    document.getElementById('statPaid').textContent = stats.paid_orders ?? '0';
    document.getElementById('statRevenue').textContent = '$' + (stats.today_revenue_usd ?? 0).toFixed(2);
    document.getElementById('statTotalRevenue').textContent = '$' + (stats.total_revenue_usd ?? 0).toFixed(2);

    // Load orders
    const ordersRes = await fetch('/api/orders?limit=100');
    const data = await ordersRes.json();
    allOrders = data.orders || [];
    renderOrders();
  } catch (e) {
    document.getElementById('ordersBody').innerHTML = `<tr><td colspan="8" class="loading">⚠️ Cannot connect to backend. Make sure the server is running.</td></tr>`;
  }
}

function renderOrders() {
  const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
  const tbody = document.getElementById('ordersBody');

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">📋</div><div>No orders found</div></div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(order => {
    const items = order.items || [];
    const itemsSummary = items.slice(0, 2).map(i => `${i.quantity}x ${i.item_name}`).join(', ');
    const moreItems = items.length > 2 ? ` +${items.length - 2} more` : '';
    const badge = STATUS_BADGES[order.status] || `<span class="badge">${order.status}</span>`;
    const typeClass = order.order_type === 'delivery' ? 'type-delivery' : 'type-pickup';
    const langFlag = LANG_FLAGS[order.language] || '🌐';

    return `<tr onclick="showDetail('${order.order_id}')" style="cursor:pointer">
      <td>${formatTime(order.created_at)}</td>
      <td>
        <strong>${order.customer_name || '—'}</strong><br>
        <small style="color:#888">${formatPhone(order.customer_phone)}</small>
      </td>
      <td><span class="${typeClass}">${order.order_type?.toUpperCase() || '—'}</span></td>
      <td>
        ${itemsSummary}${moreItems}
        <div class="items-list">${items.length} item${items.length !== 1 ? 's' : ''}</div>
      </td>
      <td><strong>$${(order.total_usd || 0).toFixed(2)}</strong></td>
      <td>${badge}</td>
      <td><span class="lang">${langFlag}</span></td>
      <td><button class="refresh-btn" onclick="event.stopPropagation();showDetail('${order.order_id}')">View</button></td>
    </tr>`;
  }).join('');
}

function showDetail(orderId) {
  const order = allOrders.find(o => o.order_id === orderId);
  if (!order) return;

  const items = order.items || [];
  const itemsHtml = items.map(i => {
    const mods = (i.modifier_names || []).join(', ');
    const modPrice = (i.modifier_prices_cents || []).reduce((a,b) => a+b, 0);
    const total = ((i.unit_price_cents + modPrice) * i.quantity / 100).toFixed(2);
    return `<div style="padding:6px 0;border-bottom:1px solid #0f3460;font-size:0.82rem">
      <strong>${i.quantity}x ${i.item_name}</strong> — $${total}
      ${mods ? `<div style="color:#888;font-size:0.75rem">${mods}</div>` : ''}
      ${i.special_instructions ? `<div style="color:#e67e22;font-size:0.75rem">Note: ${i.special_instructions}</div>` : ''}
    </div>`;
  }).join('');

  const paymentLinkHtml = order.payment_url
    ? `<a href="${order.payment_url}" target="_blank" class="payment-link">Open Payment Link ↗</a>`
    : '—';

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-row"><span class="detail-label">Order ID</span><span class="detail-value" style="font-size:0.75rem;font-family:monospace">${order.order_id}</span></div>
    <div class="detail-row"><span class="detail-label">Customer</span><span class="detail-value">${order.customer_name || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${formatPhone(order.customer_phone)}</span></div>
    <div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">${order.order_type?.toUpperCase()}</span></div>
    ${order.delivery_address ? `<div class="detail-row"><span class="detail-label">Address</span><span class="detail-value">${order.delivery_address}</span></div>` : ''}
    <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">${STATUS_BADGES[order.status] || order.status}</span></div>
    <div class="detail-row"><span class="detail-label">Language</span><span class="detail-value">${LANG_FLAGS[order.language] || ''} ${order.language?.toUpperCase()}</span></div>
    <div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">${formatTime(order.created_at)}</span></div>
    ${order.clover_order_id ? `<div class="detail-row"><span class="detail-label">Clover Order ID</span><span class="detail-value" style="font-size:0.75rem;font-family:monospace">${order.clover_order_id}</span></div>` : ''}
    <div style="margin:12px 0;font-size:0.8rem;color:#888;text-transform:uppercase;letter-spacing:0.5px">Items</div>
    ${itemsHtml}
    <div class="detail-row" style="margin-top:8px"><span class="detail-label">Total</span><span class="detail-value" style="font-size:1.1rem;color:#27ae60">$${(order.total_usd || 0).toFixed(2)}</span></div>
    <div class="detail-row"><span class="detail-label">Payment Link</span><span class="detail-value">${paymentLinkHtml}</span></div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(event) {
  if (!event || event.target === document.getElementById('modalOverlay') || event.target.classList.contains('modal-close')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// Auto-refresh every 15 seconds
loadData();
setInterval(loadData, 15000);
</script>
</body>
</html>
